apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: rook-notes-mcp
  labels:
    cloud.googleapis.com/location: GCP_REGION_PLACEHOLDER
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/client-name: gcloud
        deploy-timestamp: "DEPLOY_TIMESTAMP_PLACEHOLDER"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: REGISTRY_PLACEHOLDER/mcp:latest
        ports:
        - containerPort: 3002
        resources:
          limits:
            cpu: "1000m"
            memory: "512Mi"
        env:
        - name: NODE_ENV
          value: "production"
        - name: API_BASE_URL
          value: "API_BASE_URL_PLACEHOLDER"
