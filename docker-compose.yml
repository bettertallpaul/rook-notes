services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @rook/frontend dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - /app/services/shared/node_modules
      - /app/services/frontend/node_modules
      - /app/services/api/node_modules
      - /app/services/mcp/node_modules
      - notes_data:/app/data
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    labels:
      - dev.orbstack.domains=rook-notes.local

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @rook/api dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - /app/services/shared/node_modules
      - /app/services/frontend/node_modules
      - /app/services/api/node_modules
      - /app/services/mcp/node_modules
      - notes_data:/app/data
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_API_KEY}
    labels:
      - dev.orbstack.domains=api.rook-notes.local

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm --filter @rook/mcp dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - /app/services/shared/node_modules
      - /app/services/frontend/node_modules
      - /app/services/api/node_modules
      - /app/services/mcp/node_modules
      - notes_data:/app/data
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://api:3001
    depends_on:
      - api
    labels:
      - dev.orbstack.domains=mcp.rook-notes.local

volumes:
  node_modules:
  notes_data:
