services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - notes_data:/app/data
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - NODE_ENV=development

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run api
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - notes_data:/app/data
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npm run mcp
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - notes_data:/app/data
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://api:3001
    depends_on:
      - api

volumes:
  node_modules:
  notes_data:
