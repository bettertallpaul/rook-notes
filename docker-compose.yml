services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - notes_data:/app/data
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    labels:
      - dev.orbstack.domains=rook-notes.local

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm run api
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - notes_data:/app/data
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    labels:
      - dev.orbstack.domains=api.rook-notes.local

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm run mcp
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - notes_data:/app/data
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://api:3001
    depends_on:
      - api
    labels:
      - dev.orbstack.domains=mcp.rook-notes.local

volumes:
  node_modules:
  notes_data:
